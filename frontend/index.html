<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinAI</title>
    <link rel="stylesheet" href="/frontend/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <button id="new-chat-btn">
                    <i class="fa-regular fa-pen-to-square"></i>
                    <span>Đoạn chat mới</span>
                </button>
            </div>

            <div class="history-label">Hôm nay</div>
            <div id="chat-history-list" class="history-container">
                <!-- Javascript render history here -->
            </div>

            <div class="sidebar-footer">
                <button id="open-sub-modal" class="user-menu-btn">
                    <div class="user-avatar"><i class="fa-regular fa-user"></i></div>
                    <div class="user-info">
                        <span class="user-name">Nhà đầu tư</span>
                        <span class="user-status">Đăng ký bản tin</span>
                    </div>
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            
            <!-- Màn hình chào mừng -->
            <div id="welcome-screen" class="welcome-screen">
                <div class="brand-icon"><i class="fa-solid fa-bolt"></i></div>
                <h2>Tôi có thể giúp gì cho bạn hôm nay?</h2>
                
                <div class="suggestion-grid">
                    <div class="suggestion-card" onclick="setInput('Phân tích cổ phiếu FPT')">
                        <div class="s-icon"><i class="fa-solid fa-chart-line"></i></div>
                        <div class="s-text">Phân tích cổ phiếu FPT</div>
                    </div>
                    <div class="suggestion-card" onclick="setInput('Tình hình vĩ mô hiện tại')">
                        <div class="s-icon"><i class="fa-solid fa-earth-americas"></i></div>
                        <div class="s-text">Tình hình vĩ mô hiện tại</div>
                    </div>
                    <div class="suggestion-card" onclick="setInput('So sánh HPG và HSG')">
                        <div class="s-icon"><i class="fa-solid fa-scale-balanced"></i></div>
                        <div class="s-text">So sánh HPG và HSG</div>
                    </div>
                    <div class="suggestion-card" onclick="setInput('Lãi suất ngân hàng nào cao nhất?')">
                        <div class="s-icon"><i class="fa-solid fa-percent"></i></div>
                        <div class="s-text">Lãi suất ngân hàng</div>
                    </div>
                </div>
            </div>

            <!-- Khu vực tin nhắn -->
            <div id="chat-container" class="chat-area">
                <!-- Tin nhắn sẽ được JS thêm vào đây -->
            </div>

            <!-- Input Area -->
            <div class="input-container">
                <div class="input-box-wrapper">
                    <div id="file-preview" class="file-preview"></div>
                    
                    <div class="input-row">
                        <button id="upload-btn" class="action-btn" title="Đính kèm tệp">
                            <i class="fa-solid fa-paperclip"></i>
                        </button>
                        
                        <textarea id="user-input" placeholder="Nhắn tin cho FinAI..." rows="1"></textarea>
                        
                        <button id="send-btn" class="action-btn send-btn" disabled>
                            <i class="fa-solid fa-arrow-up"></i>
                        </button>
                    </div>
                </div>
                <div class="disclaimer">
                    FinAI có thể mắc lỗi. Hãy kiểm tra lại các thông tin quan trọng.
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Đăng ký -->
    <div id="sub-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Đăng ký nhận bản tin</h3>
                <button class="close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="sub-email" placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label>Mã cổ phiếu</label>
                    <input type="text" id="sub-ticker" placeholder="VD: FPT">
                </div>
                <button id="confirm-sub" class="primary-btn">Xác nhận</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/frontend/script.js"></script>
    <script>
        function setInput(text) {
            const input = document.getElementById('user-input');
            input.value = text;
            input.focus();
            input.dispatchEvent(new Event('input'));
        }
    </script>
</body>
</html>
